@if(toy()){
    <div class="details-container">
        <mat-card class="details-card">
            <img mat-card-image [src]="utils.getImageUrl(toy()!)" [alt]="toy()!.name">
            <mat-card-content>
                <h1>{{toy()!.name}}</h1>
                <h2 class="price">{{utils.formatPrice(toy()!.price)}}</h2>
                <p class="description">{{toy()!.description}}</p>
                <div class="chips">
                    <mat-chip-set>
                        <mat-chip>{{toy()!.type.name}}</mat-chip>
                        <mat-chip>{{toy()!.ageGroup.name}}</mat-chip>
                        <mat-chip>{{toy()!.targetGroup}}</mat-chip>
                    </mat-chip-set>
                </div>
                <p class="production-date">
                    <strong>Production date:</strong>{{utils.formatDate(toy()!.productionDate)}}
                </p>
            </mat-card-content>
            <mat-card-actions>
                <a routerLink="/" mat-button>
                    <mat-icon>arrow_back</mat-icon> Back
                </a>
                @if(authService.getActiveUser()){
                    <button mat-raised-button color="primary" (click)="addToCart()">
                        <mat-icon>add_shopping_cart</mat-icon> Add to Cart
                    </button>
                }
            </mat-card-actions>
        </mat-card>
    </div>
}@else {
    <app-loading/>
}
